name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DENO_VERSION: '2.7.7'

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Install API dependencies
        run: deno install --allow-scripts
        working-directory: apps/api

      - name: Install Web dependencies
        run: deno install --allow-scripts
        working-directory: apps/web

      - name: Run linter
        run: |
          cd apps/api && deno task lint
          cd apps/web && deno task lint

      - name: Check formatting
        run: |
          cd apps/api && deno task format:check
          cd apps/web && deno task format:check

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Install dependencies
        run: deno install --allow-scripts
        working-directory: apps/api

      - name: Generate Prisma client
        run: deno task db:generate
        working-directory: apps/api

      - name: Run API tests
        run: deno task test
        working-directory: apps/api
        env:
          JWT_SECRET: test-jwt-secret-key-for-ci
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-for-ci
          NODE_ENV: test

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Install dependencies
        run: deno install --allow-scripts
        working-directory: apps/web

      - name: Run Web tests
        run: deno task test
        working-directory: apps/web

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-format, test-api, test-web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Install API dependencies
        run: deno install --allow-scripts
        working-directory: apps/api

      - name: Install Web dependencies
        run: deno install --allow-scripts
        working-directory: apps/web

      - name: Generate Prisma client
        run: deno task db:generate
        working-directory: apps/api

      - name: Build web app
        run: deno task build
        working-directory: apps/web

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: brewform/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: brewform/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
